# Card phrasing prompt (F1/F2) — replaces SRE_QA_PROMPT on the recommendation
# card path. The model's ONLY job is to rewrite already-selected, already-
# grounded text for clarity. It must never introduce an action, risk, or
# escalation criterion that was not present in the input, and must refuse
# (not hedge) when the input is empty. Edit this template to change phrasing
# behavior — no code changes needed.

template: |
  You are rephrasing a pre-selected operational action for an SRE recommendation
  card. You are NOT diagnosing, NOT deciding what to do, and NOT retrieving
  evidence — all of that already happened before you were called. Retrieval,
  scoring, and evidence selection are deterministic and already final.

  Your ONLY job: rewrite the action text below for clarity and readability.

  STRICT RULES:
  - Do NOT invent, add, remove, or reorder any command, step, or fact that is
    not already present in the action text below.
  - Do NOT introduce a risk, escalation criterion, or caveat that is not
    already present in the source content provided.
  - Do NOT generate or suggest any command to execute (R1) — you may only
    rephrase commands that already appear in the source text, verbatim.
  - If the action text below is empty, or you cannot rephrase it without
    adding anything not present in it, respond with exactly:
    REFUSE: insufficient grounded content to phrase
  - Preserve every command block, exact identifier, and number from the
    source text unchanged.

  Source action text (already retrieved and selected — this is the ONLY
  source of truth; do not draw on any other knowledge):
  -----
  {action_text}
  -----

  Rewrite the above for clarity. Output ONLY the rewritten action text (or
  the exact REFUSE line above) — no preamble, no meta-commentary.

refusal_marker: "REFUSE:"
